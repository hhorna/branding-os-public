<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnóstico Express de Cultura | Dreizack</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">

const { useState } = React;

const MAKE_WEBHOOK = "https://hook.us2.make.com/qdty22lm7qa7tftxjdak6gyqlvoj8nxe";

const MODULOS = [
  { id: "ambiente", label: "Ambiente", preguntas: [
    { id: "amb_1", question: "¿Cómo describirías el ambiente general dentro de tu organización?", options: ["Muy positivo y colaborativo", "Funcional pero distante", "Tenso o incierto", "Variable según el área"] },
    { id: "amb_2", question: "¿Cómo es la disciplina dentro de tu organización?", options: ["Muy formal: normas claras de vestimenta, horario y orden", "Moderada: hay normas pero con flexibilidad", "Informal: cada uno maneja su propio estilo", "Depende del área o del líder"] },
    { id: "amb_3", question: "¿Cómo describes el balance entre vida personal y trabajo?", options: ["Vida y trabajo están totalmente fusionados", "Existe separación clara entre ambos", "Se integran de forma natural según cada persona", "No existe equilibrio, el trabajo siempre gana"] }
  ]},
  { id: "talento", label: "Gestión de Talento", preguntas: [
    { id: "tal_1", question: "¿Cómo se selecciona al personal en tu organización?", options: ["Por cualificación formal y competencias", "Por lealtad y obediencia al líder", "Por relaciones personales o recomendaciones", "Por potencial de desarrollo y actitud"] },
    { id: "tal_2", question: "¿Qué perfil valora más tu organización al contratar?", options: ["Alguien equilibrado en todas las áreas", "Alguien muy técnico y especializado", "Alguien comunicativo y con habilidades sociales", "Alguien innovador y disruptivo"] },
    { id: "tal_3", question: "¿Cómo se desarrolla el talento dentro de tu organización?", options: ["Con capacitaciones formales y programas estructurados", "A través de mentorías y relaciones de confianza", "Aprendiendo en el día a día sin estructura formal", "Con proyectos estratégicos y metas de crecimiento"] }
  ]},
  { id: "liderazgo", label: "Liderazgo", preguntas: [
    { id: "lid_1", question: "¿Cómo describirías al líder principal de tu organización?", options: ["Experto técnico que lidera con el ejemplo", "Orientado a resultados y control de tareas", "Sistemático y normativo, fiel a los procesos", "Inspirador con visión de largo plazo"] },
    { id: "lid_2", question: "¿Cómo reacciona el liderazgo ante los errores del equipo?", options: ["Con exigencia pero disposición a enseñar", "Con corrección estricta o presión directa", "Con reglas claras sobre cómo evitar repetirlos", "Con reflexión colectiva y aprendizaje compartido"] },
    { id: "lid_3", question: "¿Cómo se toman las decisiones importantes?", options: ["El líder decide y el equipo ejecuta", "Se consulta al equipo pero decide el líder", "Se decide por consenso colectivo", "Cada quien decide dentro de su área de autonomía"] }
  ]},
  { id: "organizacion", label: "Percepción de la Organización", preguntas: [
    { id: "org_1", question: "¿Cómo describirías la estructura de tu organización?", options: ["Jerárquica y con cadena de mando clara", "Formal pero con cierta flexibilidad operativa", "Horizontal y colaborativa", "Difusa, sin roles bien definidos"] },
    { id: "org_2", question: "¿Qué valora más tu organización en sus colaboradores?", options: ["Obediencia y cumplimiento de normas", "Resultados y eficiencia operativa", "Trabajo en equipo y sentido de comunidad", "Innovación y pensamiento propio"] },
    { id: "org_3", question: "¿Cómo se gestiona la información dentro de tu organización?", options: ["De forma centralizada: solo algunos tienen acceso", "Se comparte según jerarquía y necesidad", "Fluye libremente entre equipos", "Cada área maneja su propia información"] }
  ]},
  { id: "autopercepcion", label: "Autopercepción del Equipo", preguntas: [
    { id: "aut_1", question: "¿Cómo se ve a sí mismo tu equipo dentro de la organización?", options: ["Como un grupo unido que cuida sus tradiciones", "Como ejecutores comprometidos con los resultados", "Como profesionales ordenados que siguen las reglas", "Como personas con aspiraciones de crecimiento"] },
    { id: "aut_2", question: "¿Qué motiva principalmente a las personas de tu equipo?", options: ["La seguridad y la estabilidad laboral", "El miedo a las consecuencias de no cumplir", "El orgullo de hacer bien su trabajo", "El entusiasmo y las ganas de superarse"] },
    { id: "aut_3", question: "¿Qué tan abierto es tu equipo al cambio?", options: ["Resistente: prefiere lo conocido y estable", "Cauteloso: acepta cambios si hay claridad y orden", "Adaptable: se ajusta según las circunstancias", "Proactivo: busca y propone cambios constantemente"] }
  ]},
  { id: "gestion", label: "Sistema de Gestión", preguntas: [
    { id: "ges_1", question: "¿Cómo se planifica el trabajo en tu organización?", options: ["Con planes rígidos que se siguen al pie de la letra", "Con planes claros que permiten ajustes cuando es necesario", "Con objetivos generales pero sin planes detallados", "De forma flexible y adaptada al contexto del momento"] },
    { id: "ges_2", question: "¿Cómo se coordinan los equipos entre sí?", options: ["A través de jerarquía y órdenes directas del líder", "Con reuniones operativas donde el líder asigna tareas", "Con procesos y acuerdos compartidos entre áreas", "De forma autónoma según madurez de cada equipo"] },
    { id: "ges_3", question: "¿Cómo se resuelven los conflictos en tu organización?", options: ["Se ocultan o se evitan para no generar problemas", "El líder interviene y toma la decisión final", "Se abordan con reglas y procesos establecidos", "Se resuelven con diálogo directo entre las partes"] }
  ]}
];

const TODAS = MODULOS.flatMap(m => m.preguntas.map(p => ({ ...p, modulo: m.label })));
const TOTAL = TODAS.length;

function App() {
  const [fase, setFase] = useState("hero");
  const [paso, setPaso] = useState(0);
  const [resp, setResp] = useState({});
  const [empresa, setEmpresa] = useState("");
  const [sector, setSector] = useState("");
  const [nombre, setNombre] = useState("");
  const [email, setEmail] = useState("");
  const [report, setReport] = useState(null);

  const cur = TODAS[paso];
  const progreso = (paso / TOTAL) * 100;
  const todasOk = TODAS.every(p => resp[p.id]);

  function elegir(opt) {
    const n = { ...resp, [cur.id]: opt };
    setResp(n);
    if (paso < TOTAL - 1) setTimeout(() => setPaso(p => p + 1), 300);
  }

  async function enviar() {
    setFase("loading");

    const resumen = MODULOS.map(m =>
      m.label + ":\n" + m.preguntas.map(p => `  - ${p.question.split("?")[0]}: ${resp[p.id] || ""}`).join("\n")
    ).join("\n\n");

    const payload = {
      nombre,
      email,
      empresa,
      sector,
      fecha: new Date().toLocaleString("es-PE"),
      resumen,
      ...Object.fromEntries(TODAS.map((p, i) => [`${i + 1}_${p.id}`, resp[p.id] || ""]))
    };

    try {
      await fetch(MAKE_WEBHOOK, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
    } catch (e) {
      // CORS error es normal — Make igual recibe los datos
      // El navegador bloquea la respuesta pero el webhook fue disparado
    }
    // Siempre mostrar pantalla de confirmación
    setReport({ _pendingEmail: true });
    setFase("report");
  }

  const btn = { background: "#c9b99a", color: "#0a0a0f", border: "none", borderRadius: "8px", padding: "12px 26px", fontWeight: 700, fontSize: "13px", cursor: "pointer" };
  const btnO = { background: "transparent", color: "#c9b99a", border: "1px solid #c9b99a44", borderRadius: "8px", padding: "11px 22px", fontWeight: 600, fontSize: "12px", cursor: "pointer" };
  const card = { background: "#0f0f1a", border: "1px solid #1e1e2e", borderRadius: "14px", padding: "32px", maxWidth: "620px", margin: "0 auto 24px" };
  const inp = { width: "100%", background: "#0a0a0f", border: "1px solid #1e1e2e", borderRadius: "9px", padding: "13px 16px", color: "#e8e6e1", fontSize: "14px", outline: "none", marginBottom: "14px", boxSizing: "border-box" };
  const lbl = { fontSize: "11px", color: "#7a7a90", letterSpacing: "0.08em", display: "block", marginBottom: "6px" };
  const optBtn = (sel) => ({ display: "block", width: "100%", background: sel ? "#1a1a35" : "transparent", border: `1px solid ${sel ? "#c9b99a" : "#1e1e2e"}`, color: sel ? "#c9b99a" : "#9090a8", padding: "13px 18px", borderRadius: "9px", cursor: "pointer", fontSize: "13px", textAlign: "left", marginBottom: "10px" });

  return (
    <div style={{ background: "#0a0a0f", minHeight: "100vh", color: "#e8e6e1", fontFamily: "'Inter',system-ui,sans-serif" }}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}} *{box-sizing:border-box} button:hover{opacity:0.85}`}</style>

      <img src="https://static.wixstatic.com/media/987718_584fe7bd8733465ebbc38dbe57ef4433~mv2.jpeg" style={{ width: "100%", display: "block", objectFit: "cover" }} alt="Dreizack" onError={e => e.target.style.display = "none"} />

      {fase === "hero" && (
        <div style={{ textAlign: "center", padding: "64px 24px 48px", maxWidth: "680px", margin: "0 auto" }}>
          <div style={{ display: "inline-block", background: "#c9b99a22", border: "1px solid #c9b99a44", color: "#c9b99a", fontSize: "10px", letterSpacing: "0.2em", padding: "5px 14px", borderRadius: "20px", marginBottom: "24px" }}>BRANDING OS · DIAGNÓSTICO EXPRESS DE CULTURA</div>
          <h1 style={{ fontSize: "clamp(24px,4vw,38px)", fontWeight: 800, lineHeight: 1.2, marginBottom: "16px" }}>¿Tu marca se ve bien afuera<br />pero <span style={{ color: "#c9b99a" }}>nadie la vive adentro?</span></h1>
          <p style={{ fontSize: "14px", color: "#7a7a90", lineHeight: 1.8, marginBottom: "36px" }}>En 10 minutos descubre si tu cultura organizacional está sosteniendo o saboteando tu marca. El DEC analiza 6 módulos clave con 18 preguntas.</p>
          <button style={{ ...btn, padding: "15px 36px", fontSize: "14px" }} onClick={() => setFase("previa")}>Iniciar diagnóstico gratuito →</button>
          <div style={{ display: "flex", justifyContent: "center", gap: "40px", marginTop: "48px", paddingTop: "32px", borderTop: "1px solid #1e1e2e" }}>
            {[["18", "PREGUNTAS"], ["6", "MÓDULOS"], ["DEC", "DIAGNÓSTICO EXPRESS"]].map(([n, l]) => (
              <div key={n} style={{ textAlign: "center" }}>
                <div style={{ fontSize: "22px", fontWeight: 800, color: "#c9b99a" }}>{n}</div>
                <div style={{ fontSize: "10px", color: "#6b6b80", letterSpacing: "0.1em", marginTop: "2px" }}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {fase === "previa" && (
        <div style={{ padding: "40px 24px" }}>
          <div style={card}>
            <div style={{ fontSize: "10px", color: "#6b6b80", letterSpacing: "0.15em", marginBottom: "10px" }}>ANTES DE EMPEZAR</div>
            <div style={{ fontSize: "17px", fontWeight: 700, marginBottom: "24px" }}>Cuéntanos sobre tu empresa</div>
            <label style={lbl}>NOMBRE DE LA EMPRESA</label>
            <input style={inp} placeholder="Ej: Acuario Corp" value={empresa} onChange={e => setEmpresa(e.target.value)} />
            <label style={lbl}>SECTOR / INDUSTRIA</label>
            <input style={inp} placeholder="Ej: Retail, Servicios, Tecnología..." value={sector} onChange={e => setSector(e.target.value)} />
            <button style={{ ...btn, opacity: empresa.trim() ? 1 : 0.5 }} disabled={!empresa.trim()} onClick={() => { setPaso(0); setFase("preguntas"); }}>Empezar diagnóstico →</button>
          </div>
        </div>
      )}

      {fase === "preguntas" && (
        <div style={{ padding: "40px 24px" }}>
          <div style={{ height: "3px", background: `linear-gradient(90deg,#c9b99a ${progreso}%,#1e1e2e ${progreso}%)`, borderRadius: "2px", maxWidth: "620px", margin: "0 auto 28px" }} />
          <div style={card}>
            <div style={{ fontSize: "10px", color: "#6b6b80", letterSpacing: "0.15em", marginBottom: "4px" }}>DEC · PREGUNTA {paso + 1} DE {TOTAL}</div>
            <div style={{ fontSize: "12px", color: "#a078c8", fontWeight: 700, letterSpacing: "0.08em", marginBottom: "14px" }}>{cur.modulo.toUpperCase()}</div>
            <div style={{ fontSize: "17px", fontWeight: 700, lineHeight: 1.5, marginBottom: "24px" }}>{cur.question}</div>
            {cur.options.map(opt => <button key={opt} style={optBtn(resp[cur.id] === opt)} onClick={() => elegir(opt)}>{opt}</button>)}
            <div style={{ display: "flex", gap: "10px", marginTop: "20px" }}>
              {paso > 0 && <button style={btnO} onClick={() => setPaso(p => p - 1)}>← Anterior</button>}
              {resp[cur.id] && paso < TOTAL - 1 && <button style={btn} onClick={() => setPaso(p => p + 1)}>Siguiente →</button>}
              {todasOk && paso === TOTAL - 1 && <button style={btn} onClick={() => setFase("capture")}>Ver mi diagnóstico →</button>}
            </div>
          </div>
        </div>
      )}

      {fase === "capture" && (
        <div style={{ padding: "40px 24px" }}>
          <div style={card}>
            <div style={{ textAlign: "center", marginBottom: "28px" }}>
              <div style={{ fontSize: "28px", marginBottom: "12px" }}>🔍</div>
              <div style={{ fontSize: "18px", fontWeight: 800, marginBottom: "8px" }}>Tu diagnóstico está listo</div>
              <div style={{ fontSize: "13px", color: "#7a7a90", lineHeight: 1.7 }}>Ingresa tus datos para recibir el informe completo en tu email.</div>
            </div>
            <label style={lbl}>TU NOMBRE</label>
            <input style={inp} placeholder="Ej: Carlos Mendoza" value={nombre} onChange={e => setNombre(e.target.value)} />
            <label style={lbl}>EMAIL PROFESIONAL</label>
            <input style={inp} placeholder="carlos@empresa.com" value={email} onChange={e => setEmail(e.target.value)} />
            <button style={{ ...btn, width: "100%", padding: "15px", opacity: (nombre.trim() && email.includes("@")) ? 1 : 0.5 }} disabled={!nombre.trim() || !email.includes("@")} onClick={enviar}>Ver mi diagnóstico →</button>
            <div style={{ fontSize: "10px", color: "#4a4a60", textAlign: "center", marginTop: "12px" }}>Sin spam. Solo tu informe y, si aplica, una propuesta de Dreizack.</div>
          </div>
        </div>
      )}

      {fase === "loading" && (
        <div style={{ textAlign: "center", padding: "100px 24px" }}>
          <div style={{ display: "inline-block", width: "20px", height: "20px", border: "2px solid #c9b99a33", borderTop: "2px solid #c9b99a", borderRadius: "50%", animation: "spin 0.8s linear infinite", margin: "0 auto 20px" }} />
          <div style={{ fontSize: "14px", color: "#7a7a90" }}>Analizando la cultura de marca de <strong style={{ color: "#c9b99a" }}>{empresa}</strong>...</div>
        </div>
      )}

      {fase === "report" && report && !report.error && (
        <div style={{ padding: "40px 24px" }}>

          {/* Si Make procesó síncronamente con score */}
          {report.score && (
            <div style={{ ...card, textAlign: "center", marginBottom: "16px" }}>
              <div style={{ fontSize: "11px", color: "#7a7a90", letterSpacing: "0.15em", marginBottom: "12px" }}>ÍNDICE DE MADUREZ CULTURAL</div>
              <div style={{ fontSize: "64px", fontWeight: 900, color: report.score < 50 ? "#c07070" : report.score < 65 ? "#c9a050" : "#7ab87a", lineHeight: 1 }}>{report.score}</div>
              <div style={{ fontSize: "11px", color: "#6b6b80", marginTop: "6px" }}>de 100</div>
              {report.alerta && <div style={{ background: "#2a1010", border: "1px solid #4a2020", borderRadius: "8px", padding: "10px 16px", marginTop: "16px", fontSize: "12px", color: "#c07070" }}>⚠ {report.alerta}</div>}
            </div>
          )}

          {report.titular && (
            <div style={{ ...card, marginBottom: "16px" }}>
              <div style={{ fontSize: "11px", color: "#c9b99a", letterSpacing: "0.15em", marginBottom: "10px" }}>DIAGNÓSTICO · {empresa.toUpperCase()}</div>
              <div style={{ fontSize: "17px", fontWeight: 800, marginBottom: "16px", lineHeight: 1.4, fontStyle: "italic" }}>"{report.titular}"</div>
              <div style={{ fontSize: "13px", color: "#a0a0b8", lineHeight: 1.8 }}>{report.diagnostico_breve}</div>
            </div>
          )}

          {report.pilar1 && (
            <div style={{ maxWidth: "620px", margin: "0 auto 16px" }}>
              <div style={{ fontSize: "11px", color: "#7a7a90", letterSpacing: "0.15em", marginBottom: "12px" }}>PILARES ESTRATÉGICOS IDENTIFICADOS</div>
              {[report.pilar1, report.pilar2].map((p, i) => p && (
                <div key={i} style={{ background: "#0f0f1a", border: "1px solid #1e1e2e", borderRadius: "10px", padding: "18px", marginBottom: "10px" }}>
                  <div style={{ fontSize: "13px", fontWeight: 700, color: "#c9b99a", marginBottom: "6px" }}>◈ {p.titulo}</div>
                  <div style={{ fontSize: "12px", color: "#8b8b9a", lineHeight: 1.6 }}>{p.descripcion}</div>
                </div>
              ))}
              <div style={{ background: "#13132a", border: "1px solid #3d3d4a", borderRadius: "12px", padding: "24px", marginTop: "20px", position: "relative", overflow: "hidden" }}>
                <div style={{ filter: "blur(5px)", pointerEvents: "none", userSelect: "none", opacity: 0.5 }}>
                  {[1, 2, 3].map(i => <div key={i} style={{ background: "#0f0f1a", border: "1px solid #1e1e2e", borderRadius: "10px", padding: "18px", marginBottom: "10px" }}><div style={{ fontSize: "13px", fontWeight: 700, color: "#c9b99a", marginBottom: "6px" }}>◈ Pilar estratégico {i + 2}</div><div style={{ fontSize: "12px", color: "#8b8b9a" }}>Contenido bloqueado.</div></div>)}
                </div>
                <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", background: "#0a0a0f", border: "1px solid #c9b99a44", borderRadius: "10px", padding: "14px 22px", textAlign: "center", zIndex: 2 }}>
                  <div style={{ fontSize: "18px", marginBottom: "6px" }}>🔒</div>
                  <div style={{ fontSize: "12px", color: "#c9b99a", fontWeight: 700 }}>+3 pilares estratégicos</div>
                  <div style={{ fontSize: "11px", color: "#6b6b80", marginTop: "4px" }}>Disponibles en sesión con Dreizack</div>
                </div>
              </div>
            </div>
          )}

          {/* Pantalla cuando Make acepta en background (sin score aún) */}
          {report._pendingEmail && (
            <div style={{ ...card, textAlign: "center", marginBottom: "16px" }}>
              <div style={{ fontSize: "36px", marginBottom: "16px" }}>✉️</div>
              <div style={{ fontSize: "18px", fontWeight: 800, marginBottom: "10px" }}>¡Diagnóstico enviado!</div>
              <div style={{ fontSize: "13px", color: "#7a7a90", lineHeight: 1.8 }}>
                Estamos procesando los resultados de <strong style={{ color: "#c9b99a" }}>{empresa}</strong>.<br />
                En los próximos minutos recibirás el informe completo en <strong style={{ color: "#c9b99a" }}>{email}</strong>.
              </div>
            </div>
          )}

          <div style={{ background: "linear-gradient(135deg,#13132a,#1a1030)", border: "1px solid #3d3d60", borderRadius: "14px", padding: "36px", textAlign: "center", maxWidth: "620px", margin: "0 auto" }}>
            <div style={{ fontSize: "11px", color: "#a078c8", letterSpacing: "0.15em", marginBottom: "12px" }}>SIGUIENTE PASO</div>
            <div style={{ fontSize: "20px", fontWeight: 800, marginBottom: "10px", lineHeight: 1.3 }}>Toda marca fuerte necesita<br /><span style={{ color: "#c9b99a" }}>una cultura capaz de sostenerla.</span></div>
            <div style={{ fontSize: "13px", color: "#7a7a90", lineHeight: 1.7, marginBottom: "24px" }}>Este diagnóstico es el punto de partida. En una sesión con Dreizack construimos la estrategia completa.</div>
            <button style={{ ...btn, padding: "15px 36px", fontSize: "14px" }} onClick={() => window.open("mailto:hola@dreizackstudios.com?subject=Quiero mi estrategia completa - " + empresa, "_blank")}>Quiero mi estrategia completa →</button>
            <div style={{ fontSize: "10px", color: "#4a4a60", marginTop: "14px" }}>Dreizack Studios · Branding OS/OC</div>
          </div>
        </div>
      )}

      {fase === "report" && report?.error && (
        <div style={{ textAlign: "center", padding: "80px 24px" }}>
          <div style={{ fontSize: "13px", color: "#c07070", marginBottom: "16px" }}>Error al procesar el diagnóstico. Intenta nuevamente.</div>
          <button style={btn} onClick={() => setFase("capture")}>Reintentar</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
